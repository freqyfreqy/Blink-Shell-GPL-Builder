name: Build Blink Shell

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Locate and Execute Builder Script
        run: |
          echo "=== Available Files in Repository ==="
          ls -R
          
          echo "=== Searching for executable shell script ==="
          SCRIPT_PATH=$(find . -name "*.sh" -maxdepth 2 | head -n 1)
          
          if [ -z "$SCRIPT_PATH" ]; then
            echo "ERROR: No .sh script file found in this repository."
            exit 1
          fi
          
          echo "Found script at: $SCRIPT_PATH"
          chmod +x "$SCRIPT_PATH"
          
          echo "=== Launching Build ==="
          bash "$SCRIPT_PATH"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blink-ipa
          path: |
            *.ipa
            dist/*.ipa
            build/*.ipa
            output/*.ipa
          if-no-files-found: warn
