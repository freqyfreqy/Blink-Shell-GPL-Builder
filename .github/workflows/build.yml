name: Build Blink Shell

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Patch Script and Execute Workspace Build
        run: |
          SCRIPT_PATH=$(find . -name "*.sh" -maxdepth 2 | head -n 1)
          
          # Force the internal compilation flags to use workspace targets if xcodebuild fails
          sed -i '' 's/xcodebuild -project Blink.xcodeproj/xcodebuild -workspace Blink.xcworkspace/g' "$SCRIPT_PATH" 2>/dev/null || true
          
          chmod +x "$SCRIPT_PATH"
          bash "$SCRIPT_PATH"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blink-ipa
          path: |
            *.ipa
            dist/*.ipa
            build/*.ipa
            output/*.ipa
          if-no-files-found: warn
