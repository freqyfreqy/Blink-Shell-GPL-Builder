name: Build Blink Shell

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug and Run Build Script
        run: |
          # List files to confirm the script name
          ls -la
          
          # Force execution via bash explicitly
          chmod +x ./build*.sh
          bash ./build-blink-shell-gpl.sh || bash ./build.sh

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blink-ipa
          path: |
            *.ipa
            dist/*.ipa
            build/*.ipa
          if-no-files-found: warn
