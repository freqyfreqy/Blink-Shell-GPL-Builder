name: Build Blink Shell

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Stable Build
        run: |
          SCRIPT_PATH=$(find . -name "*.sh" -maxdepth 2 | head -n 1)
          chmod +x "$SCRIPT_PATH"
          
          # Force the builder to check out an older, verified release tag 
          # where Blink.xcodeproj is guaranteed to exist in the root.
          # We use '--update' or alter the flag depending on script capability:
          bash "$SCRIPT_PATH" --update v17.0.0 || bash "$SCRIPT_PATH"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: blink-ipa
          path: |
            *.ipa
            dist/*.ipa
            build/*.ipa
            output/*.ipa
            blink-src/build/*.ipa
          if-no-files-found: warn
